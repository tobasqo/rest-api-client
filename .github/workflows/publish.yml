name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup UV
      uses: astral-sh/setup-uv@v7
    
    - name: Setup Python
      run: uv python install 3.10

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      run: uv publish
