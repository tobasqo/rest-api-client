[project]
name = "rest-api-client"
dynamic = ["version"]
readme = "README.md"
authors = [
    { name = "tobasqo", email = "szymon.j.jaskowski@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["uv_build>=0.9.2,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "ruff>=0.15.2",
]
